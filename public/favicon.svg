<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Círculo de recorte — fondo negro redondo -->
  <defs>
    <clipPath id="round">
      <circle cx="50" cy="50" r="50"/>
    </clipPath>
  </defs>

  <!-- Fondo negro circular -->
  <circle cx="50" cy="50" r="50" fill="#0a0a0a"/>

  <!-- Rosetón en blanco — centrado -->
  <g transform="translate(50,50)" clip-path="url(#round)">
    <!-- Círculo exterior -->
    <circle cx="0" cy="0" r="36" fill="none" stroke="#ffffff" stroke-width="2.5"/>
    <!-- Cruz halo -->
    <g opacity="0.15">
      <line x1="0" y1="-48" x2="0" y2="48" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
      <line x1="-48" y1="0" x2="48" y2="0" stroke="#ffffff" stroke-width="11" stroke-linecap="round"/>
    </g>
    <!-- Cruz principal -->
    <line x1="0" y1="-48" x2="0" y2="48" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-48" y1="0" x2="48" y2="0" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round"/>
    <!-- Círculo interior rosetón -->
    <circle cx="0" cy="0" r="10.5" fill="none" stroke="#ffffff" stroke-width="1.8"/>
    <!-- 5 pétalos -->
    <circle cx="0"     cy="-15.2" r="4.8" fill="#ffffff"/>
    <circle cx="14.5"  cy="-4.7"  r="4.8" fill="#ffffff"/>
    <circle cx="8.9"   cy="12.3"  r="4.8" fill="#ffffff"/>
    <circle cx="-8.9"  cy="12.3"  r="4.8" fill="#ffffff"/>
    <circle cx="-14.5" cy="-4.7"  r="4.8" fill="#ffffff"/>
    <!-- Centro -->
    <circle cx="0" cy="0" r="3.3" fill="#ffffff"/>
  </g>
</svg>
