<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Fondo negro -->
  <rect width="100" height="100" fill="#0a0a0a"/>

  <!-- Rosetón centrado -->
  <g transform="translate(50, 50)">
    <!-- Círculo exterior -->
    <circle cx="0" cy="0" r="36" fill="transparent" stroke="#C9A96E" stroke-width="2.5"/>

    <!-- Cruz halo -->
    <g opacity="0.2">
      <line x1="0" y1="-44" x2="0" y2="44" stroke="#C9A96E" stroke-width="8" stroke-linecap="round"/>
      <line x1="-44" y1="0" x2="44" y2="0" stroke="#C9A96E" stroke-width="8" stroke-linecap="round"/>
    </g>
    <!-- Cruz principal -->
    <line x1="0" y1="-44" x2="0" y2="44" stroke="#C9A96E" stroke-width="2" stroke-linecap="round"/>
    <line x1="-44" y1="0" x2="44" y2="0" stroke="#C9A96E" stroke-width="2" stroke-linecap="round"/>

    <!-- Círculo interior rosetón -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#C9A96E" stroke-width="2"/>

    <!-- 5 pétalos -->
    <circle cx="0"     cy="-15"  r="4.5" fill="#C9A96E"/>
    <circle cx="14.3"  cy="-4.6" r="4.5" fill="#C9A96E"/>
    <circle cx="8.8"   cy="12.1" r="4.5" fill="#C9A96E"/>
    <circle cx="-8.8"  cy="12.1" r="4.5" fill="#C9A96E"/>
    <circle cx="-14.3" cy="-4.6" r="4.5" fill="#C9A96E"/>

    <!-- Centro -->
    <circle cx="0" cy="0" r="3.2" fill="#C9A96E"/>
  </g>
</svg>
